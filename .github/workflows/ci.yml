name: CI

on:
  push:
  pull_request:

# The offline suites run everywhere. Integration tests (@pytest.mark.integration)
# need a live Ollama + Pinecone, which GitHub-hosted runners don't provide — they
# are run locally / on a self-hosted runner via `RUN_INTEGRATION=1` (see
# docs/live-runs-provisioning.md), not here.

jobs:
  ml-tests:
    name: ML (pytest, offline)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
          cache: pip
      - run: pip install -r requirements-ci.txt
      - run: python -m pytest tests/unit tests/eval tests/api -q

  express-tests:
    name: Express (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: api/package-lock.json
      - run: npm ci
      - run: npm test

  frontend-tests:
    name: Frontend (vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npm test
